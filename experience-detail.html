<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  padding: 100px 50px;
  background: white;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.content {
  max-width: 800px;
  margin: auto;
  text-align: center;
}

img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h1 id="title"></h1>

<div class="content">
  <img id="image">
  <p id="description"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

fetch('data/experiences.json')
.then(res => res.json())
.then(data => {
  const exp = data.find(e => e.Category === name);

  if(exp){
    document.getElementById('title').innerText = exp.Category;
    document.getElementById('image').src = "images/" + exp.Image;
    document.getElementById('description').innerText = exp.Description;
  }
});
</script>

<!-- CHATBOT BUTTON -->
<div id="chatbot-btn">💬</div>

<!-- CHAT WINDOW -->
<div id="chatbot">
  <div id="chat-header">Chat with us</div>
  <div id="chat-body"></div>
  <input type="text" id="chat-input" placeholder="Type a message...">
</div>

<style>
#chatbot-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #c9a74d;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
}

/* CHATBOX */
#chatbot {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 300px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
}

#chat-header {
  background: #c9a74d;
  color: white;
  padding: 10px;
  border-radius: 12px 12px 0 0;
}

#chat-body {
  height: 200px;
  overflow-y: auto;
  padding: 10px;
}

#chat-input {
  border: none;
  padding: 10px;
  border-top: 1px solid #eee;
  outline: none;
}
</style>

<script>
// TOGGLE CHAT
const btn = document.getElementById("chatbot-btn");
const chat = document.getElementById("chatbot");

btn.onclick = () => {
  chat.style.display = chat.style.display === "flex" ? "none" : "flex";
};

// LOAD CHATBOT DATA
let responses = [];

fetch('data/chatbot.json')
.then(res => res.json())
.then(data => {
  responses = data;
});

// HANDLE INPUT
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    const userText = input.value;
    body.innerHTML += `<p><strong>You:</strong> ${userText}</p>`;

    let reply = "I don't understand, please contact the school.";

    responses.forEach(item => {
      if(userText.toLowerCase().includes(item.Question.toLowerCase())){
        reply = item.Answer;
      }
    });

    setTimeout(() => {
      body.innerHTML += `<p><strong>Bot:</strong> ${reply}</p>`;
      body.scrollTop = body.scrollHeight;
    }, 500);

    input.value = "";
  }
});
</script>

</body>
</html>
